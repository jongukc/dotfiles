# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'christoomey/vim-tmux-navigator'
#set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'

# Resurrect
set -g @resurrect-capture-pane-contents 'on'

# Color scheme
color_bg="#1d2021"
color_fg="#d4be98"
color_subtext_1="#d5c4a1"
color_overlay_2="#a89984"
color_overlay_1="#928374"
color_overlay_0="#7c6f64"
color_surface_2="#665c54"
color_surface_1="#504945"
color_surface_0="#32302f"
color_mantle="#1d2021"
color_crust="#1d2021"
color_red="#ea6962"
color_orange="#e78a4e"
color_yellow="#d8a657"
color_green="#a9b665"
color_cyan="#89b482"
color_blue="#7daea3"
color_pink="#d3869b"
color_mauve="#d3869b"
color_lavender="#b16286"
color_rosewater="#d4be98"
color_flamingo="#ddc7a1"
color_teal="#89b482"
color_sky="#89b482"
color_sapphire="#89b482"
color_maroon="#ea6962"
color_peach="#e78a4e"

# Status bar
set -g status-position top
set -g status-style "fg=${color_fg},bg=default"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#[fg=${color_teal},bold]  #S #[fg=${color_fg},nobold] | "
set -g status-right " #{cpu}   #{mem} "
set -g window-status-format " #I:#W"
set -g window-status-current-format "#[fg=${color_green},bold]  #[underscore]#I:#W"
set -g message-style "fg=${color_fg},bg=default"

# Pane border
#set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_blue},##{?pane_synchronized,fg=#{@thm_blue},fg=#{@thm_blue}}}"
set -g pane-border-style "fg=${color_overlay_2},bg=${color_bg}"
set -g pane-active-border-style "fg=${color_blue},bg=${color_bg}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

