# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Color scheme
# Configure Catppuccin
set -g @catppuccin_flavor "mocha" # We use mocha as the base to override

# Override catppuccin colors with gruvbox material
# Gruvbox Material Dark Medium Palette
set -ogq @thm_bg "#282828"
set -ogq @thm_fg "#d4be98"

# Surfaces and Overlays
set -ogq @thm_subtext_1 "#d5c4a1"
set -ogq @thm_subtext_0 "#bdae93"
set -ogq @thm_overlay_2 "#a89984"
set -ogq @thm_overlay_1 "#928374"
set -ogq @thm_overlay_0 "#7c6f64"
set -ogq @thm_surface_2 "#665c54"
set -ogq @thm_surface_1 "#504945"
set -ogq @thm_surface_0 "#3c3836"
set -ogq @thm_mantle "#1d2021"
set -ogq @thm_crust "#1d2021"

# Colors
set -ogq @thm_red "#ea6962"
set -ogq @thm_orange "#e78a4e"
set -ogq @thm_yellow "#d8a657"
set -ogq @thm_green "#a9b665"
set -ogq @thm_cyan "#89b482"
set -ogq @thm_blue "#7daea3"
set -ogq @thm_darkblue "#0d3138"
set -ogq @thm_pink "#d3869b"
set -ogq @thm_mauve "#d3869b"
set -ogq @thm_lavender "#b16286"
set -ogq @thm_rosewater "#d4be98"
set -ogq @thm_flamingo "#ddc7a1"
set -ogq @thm_teal "#89b482"
set -ogq @thm_sky "#89b482"
set -ogq @thm_sapphire "#89b482"
set -ogq @thm_maroon "#ea6962"
set -ogq @thm_peach "#e78a4e"

# Status bar colors
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

set -g @catppuccin_status_background "#282828"
set -g @catppuccin_window_status_style "slanted" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"
set -g @catppuccin_window_text " #T"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_number_color "#{@thm_blue}"

# Pane border
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_blue},##{?pane_synchronized,fg=#{@thm_blue},fg=#{@thm_blue}}}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

