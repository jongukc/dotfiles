set -g default-terminal "tmux-256color"
set -as terminal-features ',*:usstyle' 
set -as terminal-features ',foot:RGB' 

# Set colors
set-option -sa terminal-overrides ",xterm*:Tc"

# Start windows index at 1
set -g base-index 1

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-x
bind-key C-x send-prefix

# split panes using | and -
bind \\ split-window -h
bind - split-window -v
unbind '"'
unbind %

set -s escape-time 0
# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf

# unbind o to use Ctrl+x o in gdb
unbind o

# switch panes using Alt-arrow without prefix
#bind -n M-h select-pane -L
#bind -n M-l select-pane -R
#bind -n M-k select-pane -U
#bind -n M-j select-pane -D

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

# Bind Alt-h/j/k/l to navigate panes
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h'  'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k'  'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l'  'select-pane -R'

# Bind Ctrl-h/l to navigate windows
bind-key -n C-h select-window -p
bind-key -n C-l select-window -n

bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# -- tmux copy-mode QoL tweaks -------------------------------------------------
# Paste into ~/.tmux.conf (or ~/.tmux.conf.local if you use gpakosz/.tmux),
# then reload: prefix + r (gpakosz) or `tmux source ~/.tmux.conf`.

set -s copy-command 'wl-copy'

# Prerequisites: mouse support + vi-style copy-mode
set -g mouse on
set -g status-keys vi
setw -g mode-keys vi

# 1) Keep copy-mode after mouse drag-select (don't snap back to bottom)
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "wl-copy"

# 2) Single click no longer exits copy-mode; it just clears the current selection
unbind-key -T copy-mode-vi MouseDown1Pane
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection

# 3) Double / triple click (word / line select) also stay in copy-mode
unbind-key -T copy-mode-vi DoubleClick1Pane
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "wl-copy"
unbind-key -T copy-mode-vi TripleClick1Pane
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "wl-copy"

# 4) Wheel scroll speed in copy-mode (lines per notch — tweak to taste)
unbind-key -T copy-mode-vi WheelUpPane
bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 5 scroll-up
unbind-key -T copy-mode-vi WheelDownPane
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 5 scroll-down

# Exit copy-mode with `q` or `Esc` as usual.

