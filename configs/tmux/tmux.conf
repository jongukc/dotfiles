# Status bar
set -g status-position top
set -g status-style "fg=${color_fg},bg=default"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#[fg=${color_green},bold]  #S #[fg=${color_fg},nobold] | "
# set -g status-right " #{cpu}   #{mem} "
set -g window-status-format " #I:#W"
set -g window-status-current-format "#[fg=${color_yellow},bold]  #[underscore]#I:#W"
set -g message-style "fg=${color_fg},bg=default"

# Pane border
set -g pane-border-style "fg=${color_overlay_0}"
set -g pane-active-border-style "fg=${color_blue}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

