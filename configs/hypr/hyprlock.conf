background {
    monitor =
    # Use the same image path as in hyprpaper.conf
    path = /home/jonguk/.screen/bg.jpg
    
    # Blur effect (optional, looks nice on lock screen)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    # outer_color = rgb(32302f) # Gruvbox Dark (Surface0)
    # inner_color = rgb(235, 219, 178) # Gruvbox Foreground
    # font_color = rgb(40, 40, 40)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center

    # Gruvbox Colors for states
    # check_color = rgb(215, 153, 33) # Yellow
    # fail_color = rgb(204, 36, 29) # Red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
}

label {
    monitor =
    text = $TIME
    # color = rgb(235, 219, 178)
    font_size = 64
    font_family = JetBrainsMono NF
    position = 0, 80
    halign = center
    valign = center
}
