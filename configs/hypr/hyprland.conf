########################################################################################
# HYPRLAND CONFIG (MIGRATED FROM SWAY)
# Theme: Gruvbox Material
# FIXED VERSION
########################################################################################

################
### MONITORS ###
################

# Original: output eDP-1 scale 1.6
monitor=eDP-1,preferred,auto,1.6
# Fallback for other monitors
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

$terminal = foot
$menu = rofi -show drun -font "JetBrainsMono NF 12" -config ~/.config/rofi/rofidmenu.rasi


#################
### AUTOSTART ###
#################

exec-once = mako
exec-once = nm-applet --indicator
exec-once = fcitx5 -d
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = LIBVA_DRIVER_NAME,iHD
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 8
    gaps_out = 0
    border_size = 1

    # Gruvbox Material Colors
    col.active_border = rgb(7DAEA3)
    col.inactive_border = rgb(32302f)

    layout = dwindle
    resize_on_border = false
    allow_tearing = false
}

decoration {
    rounding = 10
    
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = ctrl:swapcaps
    
    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        clickfinger_behavior = true
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# -- Applications --
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, D, exec, $menu
bind = $mainMod, Q, exec, hyprlock
bind = $mainMod SHIFT, E, exec, /home/jonguk/.config/hypr/scripts/powermenu

# -- System --
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, X, exit,

# -- Focus (Vim Style) --
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# -- Focus (Arrow Keys) --
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

# -- Move Window (Vim Style) --
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# -- Move Window (Arrow Keys) --
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# -- Layout Manipulation --
bind = $mainMod, B, togglesplit,
bind = $mainMod, V, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, space, togglefloating,
bind = $mainMod, space, cyclenext,
bind = $mainMod, W, togglegroup,

# -- Scratchpad --
bind = $mainMod, plus, togglespecialworkspace
bind = $mainMod SHIFT, plus, movetoworkspace, special

# -- Workspaces --
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -- Move to Workspaces --
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -- Media Keys --
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
bindl  = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindl  = ,XF86AudioMicMute, exec, wpctl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind   = ,Print, exec, grim -g "$(slurp)" - | wl-copy

# -- Mouse Binding --
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- Resize Submap --
bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset 
bind = , return, submap, reset 
submap = reset


##############################
### WINDOWS AND WORKSPACES ###
##############################

# FIXED: Use windowrulev2 with suppressevent
# Ignore maximize requests from apps.
windowrulev2 = suppressevent maximize, class:.*

# FIXED: Use windowrulev2
# Fix XWayland dragging issues
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pin:0
