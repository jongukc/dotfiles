########################################################################################
# HYPRLAND CONFIG (MIGRATED FROM SWAY)
# Theme: dalbit
########################################################################################

env = XCURSOR_THEME,Qogir-Dark
env = XCURSOR_SIZE,24

# Colors (dalbit)
$color_bg = rgb(151515)
$color_fg = rgb(ced0d6)
$color_subtext_1 = rgb(b8bac0)
$color_overlay_2 = rgb(909298)
$color_overlay_1 = rgb(66686e)
$color_overlay_0 = rgb(474747)
$color_surface_2 = rgb(383838)
$color_surface_1 = rgb(2c2c2c)
$color_surface_0 = rgb(222222)
$color_mantle = rgb(1c1c1c)
$color_crust = rgb(151515)
$color_red = rgb(e04a2a)
$color_orange = rgb(bc6838)
$color_yellow = rgb(d9a82e)
$color_green = rgb(74bc42)
$color_cyan = rgb(4fa8a0)
$color_blue = rgb(7eb0cc)
$color_pink = rgb(d07878)
$color_mauve = rgb(d07878)
$color_lavender = rgb(d07878)
$color_rosewater = rgb(ced0d6)
$color_flamingo = rgb(b8bac0)
$color_teal = rgb(4fa8a0)
$color_sky = rgb(70c8bc)
$color_sapphire = rgb(7eb0cc)
$color_maroon = rgb(e04a2a)
$color_peach = rgb(bc6838)

$shadow_col = rgba(1a1a1aee)

################
### MONITORS ###
################

# Original: output eDP-1 scale 1.6
monitor=DP-1,3840x2160,0x0,1.25
monitor=HDMI-A-1,3840x2160,3072x0,1.67,transform,3
# monitor=HDMI-A-2,2560x1440,0x0,1.25,transform,1
# Fallback for other monitors
# monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

$terminal = foot
$menu = rofi -show drun -config ~/.config/rofi/rofidmenu.rasi

#################
### AUTOSTART ###
#################

exec-once = swaync
# exec-once = nm-applet --indicator
exec-once = fcitx5 -d
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprpm reload -n
exec-once = hyprctl setcursor Qogir-Dark 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Qogir-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = wpctl set-volume @DEFAULT_SINK@ 1.0
exec-once = /usr/lib/polkit-kde-authentication-agent-1

###############
### PLUGINS ###
###############

plugin {
    hy3 {
        tabs {
            height = 20
            padding = 4
            # radius = 
            render_text = true
            text_center = true
            text_font = "JetBrainsMono NF"
            text_height = 10

            col.active = $color_blue
            col.active.border = $color_blue
            col.active.text = $color_bg

            col.inactive = $color_surface_0
            col.inactive.border = $color_surface_0
            col.inactive.text = $color_overlay_1

            col.urgent = $color_red
            col.urgent.border = $color_red
            col.urgent.text = $color_bg
        }

        autotile {
            enable = true
            trigger_width = 800
            trigger_height = 500
        }
    }
}

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = LIBVA_DRIVER_NAME,iHD
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 1

    col.active_border = $color_blue
    col.inactive_border = $color_surface_0

    layout = hy3
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 10
    
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $shadow_col
    }

    blur {
        enabled = true
        size = 5          # Adjust the blur radius
        passes = 1        # Number of blur passes (more = slower, smoother)
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
    }

    # active_opacity = 1.0
    # inactive_opacity = 0.8
}

animations {
    enabled = yes

    bezier = easeOut, 0.16, 1, 0.3, 1

    animation = windows, 1, 5, easeOut, slide
    animation = windowsOut, 1, 5, easeOut, slide
    animation = windowsMove, 1, 5, easeOut, slide

    animation = border, 1, 10, default
    animation = fade, 1, 5, easeOut

    animation = workspaces, 1, 6, easeOut, slidefade 20%
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = ctrl:swapcaps
    
    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        clickfinger_behavior = true
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# -- Applications --
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, D, exec, $menu
bind = $mainMod, Q, exec, loginctl lock-session
bind = $mainMod SHIFT, E, exec, /home/jonguk/.config/hypr/scripts/powermenu

# -- System --
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, X, exit,

# -- Focus (Vim Style) --
# bind = $mainMod, H, movefocus, l
# bind = $mainMod, J, movefocus, d
# bind = $mainMod, K, movefocus, u
# bind = $mainMod, L, movefocus, r

# -- Focus (Arrow Keys) --
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

# -- Focus (Hy3 Specific) --
bind = $mainMod, H, hy3:movefocus, l
bind = $mainMod, J, hy3:movefocus, d
bind = $mainMod, K, hy3:movefocus, u
bind = $mainMod, L, hy3:movefocus, r

# -- Move --
bind = $mainMod SHIFT, H, hy3:movewindow, l
bind = $mainMod SHIFT, J, hy3:movewindow, d
bind = $mainMod SHIFT, K, hy3:movewindow, u
bind = $mainMod SHIFT, L, hy3:movewindow, r

# -- Layout Manipulation --
bind = $mainMod, B, togglesplit,
bind = $mainMod, V, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, space, togglefloating,
bind = $mainMod, space, cyclenext,
bind = $mainMod, W, hy3:changegroup, toggletab
bind = $mainMod, minus, hy3:makegroup, v
bind = $mainMod, backslash, hy3:makegroup, h

# -- Scratchpad --
bind = $mainMod, plus, togglespecialworkspace
bind = $mainMod SHIFT, plus, movetoworkspace, special

# -- Workspaces --
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -- Move to Workspaces --
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -- Media Keys --
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
bindl  = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindl  = ,XF86AudioMicMute, exec, wpctl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
# bind   = ,Print, exec, grim -g "$(slurp)" - | wl-copy
bind   = ,Print, exec, grim -g "$(slurp)" - | swappy -f -

# -- Mouse Binding --
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- Resize Submap --
bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset 
bind = , return, submap, reset 
submap = reset


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps.
windowrule = match:class .*, suppress_event maximize

# Fix XWayland dragging issues
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on

# Smart borders
# workspace = w[tv1]s[false], gapsout:0, gapsin:0
# workspace = f[1]s[false], gapsout:0, gapsin:0
# windowrule = border_size 0, match:float 0, match:workspace w[tv1]s[false]
# windowrule = rounding 10, match:float 0, match:workspace w[tv1]s[false]
# windowrule = border_size 0, match:float 0, match:workspace f[1]s[false]
# windowrule = rounding 10, match:float 0, match:workspace f[1]s[false]

##################
### NVIDIA GPU ###
##################

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Bind Workspaces 1-5 to the primary monitor                                                                                            
workspace = 1, monitor:DP-1                                                                                                             
workspace = 2, monitor:DP-1                                                                                                             
workspace = 3, monitor:DP-1                                                                                                             
workspace = 4, monitor:DP-1                                                                                                             
workspace = 5, monitor:DP-1                                                                                                             
                                                                                                                                        
# Bind Workspaces 6-10 to the secondary monitor                                                                                         
workspace = 6, monitor:HDMI-A-1                                                                                                         
workspace = 7, monitor:HDMI-A-1                                                                                                         
workspace = 8, monitor:HDMI-A-1                                                                                                         
workspace = 9, monitor:HDMI-A-1                                                                                                         
workspace = 10, monitor:HDMI-A-1
